services:

  discovery-service:
    container_name: edgecloud-discovery-service
    build:
      context: ../../../../edgecloud-discovery-service
    ports:
      - "${DISCOVERY_PORT}:8761"
    networks:
      - edgecloud-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8761/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  api-gateway:
    container_name: edgecloud-api-gateway
    build:
      context: ../../../../edgecloud-api-gateway
    ports:
      - "${GATEWAY_PORT}:8080"
    depends_on:
      - discovery-service
      - auth-service
      - monitoring-service
      - device-service
      - alert-service
    environment:
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
    networks:
      - edgecloud-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  auth-service:
    container_name: edgecloud-auth-service
    build:
      context: ../../../../edgecloud-auth-service
    ports:
      - "8081:8081"
    depends_on:
      - discovery-service
      - auth-mysql
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://auth-mysql:3306/auth_db
      SPRING_DATASOURCE_USERNAME: ${AUTH_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_DB_PASSWORD}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
    networks:
      - edgecloud-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  monitoring-service:
    container_name: edgecloud-monitoring-service
    build:
      context: ../../../../edgecloud-monitoring-service
    ports:
      - "8082:8082"
    depends_on:
      - discovery-service
      - monitoring-mysql
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:mysql://monitoring-mysql:3306/monitoring_db
      SPRING_DATASOURCE_USERNAME: ${MONITORING_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${MONITORING_DB_PASSWORD}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
    networks:
      - edgecloud-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  device-service:
    container_name: edgecloud-device-service
    build:
      context: ../../../../edgecloud-device-service
    ports:
      - "8083:8083"
    depends_on:
      - discovery-service
      - device-mysql
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:mysql://device-mysql:3306/device_db
      SPRING_DATASOURCE_USERNAME: ${DEVICE_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DEVICE_DB_PASSWORD}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
    networks:
      - edgecloud-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  alert-service:
    container_name: edgecloud-alert-service
    build:
      context: ../../../../edgecloud-alert-service
    ports:
      - "8084:8084"
    depends_on:
      - discovery-service
      - alert-mysql
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:mysql://alert-mysql:3306/alert_db
      SPRING_DATASOURCE_USERNAME: ${ALERT_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${ALERT_DB_PASSWORD}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
    networks:
      - edgecloud-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  auth-mysql:
    image: mysql:8.0
    container_name: edgecloud-auth-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${AUTH_DB_NAME}
      MYSQL_ROOT_PASSWORD: ${AUTH_DB_ROOT_PASSWORD}
      MYSQL_USER: ${AUTH_DB_USER}
      MYSQL_PASSWORD: ${AUTH_DB_PASSWORD}
    ports:
      - "${AUTH_DB_PORT}:3306"
    volumes:
      - auth_mysql_data:/var/lib/mysql
    networks:
      - edgecloud-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${AUTH_DB_USER} -p${AUTH_DB_PASSWORD} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  monitoring-mysql:
    image: mysql:8.0
    container_name: edgecloud-monitoring-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MONITORING_DB_NAME}
      MYSQL_ROOT_PASSWORD: ${MONITORING_DB_ROOT_PASSWORD}
      MYSQL_USER: ${MONITORING_DB_USER}
      MYSQL_PASSWORD: ${MONITORING_DB_PASSWORD}
    ports:
      - "${MONITORING_DB_PORT}:3306"
    volumes:
      - monitoring_mysql_data:/var/lib/mysql
    networks:
      - edgecloud-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${MONITORING_DB_USER} -p${MONITORING_DB_PASSWORD} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  device-mysql:
    image: mysql:8.0
    container_name: edgecloud-device-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DEVICE_DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DEVICE_DB_ROOT_PASSWORD}
      MYSQL_USER: ${DEVICE_DB_USER}
      MYSQL_PASSWORD: ${DEVICE_DB_PASSWORD}
    ports:
      - "${DEVICE_DB_PORT}:3306"
    volumes:
      - device_mysql_data:/var/lib/mysql
    networks:
      - edgecloud-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${DEVICE_DB_USER} -p${DEVICE_DB_PASSWORD} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  alert-mysql:
    image: mysql:8.0
    container_name: edgecloud-alert-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${ALERT_DB_NAME}
      MYSQL_ROOT_PASSWORD: ${ALERT_DB_ROOT_PASSWORD}
      MYSQL_USER: ${ALERT_DB_USER}
      MYSQL_PASSWORD: ${ALERT_DB_PASSWORD}
    ports:
      - "${ALERT_DB_PORT}:3306"
    volumes:
      - alert_mysql_data:/var/lib/mysql
    networks:
      - edgecloud-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${ALERT_DB_USER} -p${ALERT_DB_PASSWORD} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

networks:
  edgecloud-network:
    driver: bridge

volumes:
  auth_mysql_data:
  monitoring_mysql_data:
  device_mysql_data:
  alert_mysql_data: